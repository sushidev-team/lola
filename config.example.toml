# lola configuration — copy to ~/.lola/config.toml (mode 0600).
#
# This file contains NO secrets. The Linear API key lives in the macOS
# Keychain or an environment variable (see [linear] below).
#
# All Linear references (team_id, project_id, cycle_id, state_ids,
# match_labels, assignee_user_id, on_sent_*_label) are Linear UUIDs, not
# names. The `lola` TUI resolves names to IDs for you when creating a poll.

[defaults]
# Go duration string. Minimum is 30s (Linear rate limit); lower values are
# clamped up, not rejected. Default when omitted: 60s.
poll_interval = "60s"
# Fallback per-poll cap for polls that don't set concurrency_cap themselves.
concurrency_cap = 2
# Hard ceiling on counted native sessions across ALL polls. Must be > 0.
global_cap = 4
# Coding agent spawned per issue. One of: claude (default) | codex | opencode.
# This is the GLOBAL default; override it per repo with [[project]].agent below.
# Omitted or empty resolves to claude, so existing configs are unchanged.
#   claude   — Claude Code (default). Lifecycle callbacks via a generated
#              .lola/settings.json hooks file (Stop / Notification / SessionEnd /
#              PostToolUse / UserPromptSubmit) posted to `lola hook`.
#   codex    — OpenAI Codex CLI. Runs unattended (--ask-for-approval never,
#              --sandbox workspace-write). Lifecycle callbacks via its `notify`
#              config key: lola sets CODEX_HOME=<worktree>/.lola/codex, writes
#              that config.toml, and best-effort symlinks your existing
#              ~/.codex/auth.json so a prior `codex login` still works.
#   opencode — sst/opencode. Runs unattended (--auto). Lifecycle callbacks via an
#              in-process plugin lola writes to <worktree>/.opencode/plugins/.
# The configured agent's binary must be on PATH — the daemon health-gate checks
# it (claude|codex|opencode) instead of always claude, and `lola doctor` reports
# it. Provider auth is inherited from the daemon/pane environment
# (ANTHROPIC_API_KEY for claude, OPENAI_API_KEY for codex) or an existing CLI
# login (`codex login`, `opencode auth`); it is NEVER stored in this file.
# agent = "claude"
# Whether the TUI owns the daemon lifecycle: silently start it on open when the
# socket is dead, ^r restart (brings up the newest build), ^x stop. Default true.
# Set false when a launchd KeepAlive job owns the daemon so the TUI never fights
# the supervisor (it then hides its start/stop/restart keys). Do not run both.
# manage_daemon = true
#
# --- Project defaults -------------------------------------------------------
# Every key below is the fallback for the same-named [[project]] key. A project
# that OMITS the key inherits this value; a project that sets it overrides it.
# The point is that shared setup — which Linear label triggers a pickup, which
# label marks an issue as taken, the worktree bootstrap — is written ONCE here
# instead of repeated in every [[project]].
#
# Inheritance is by KEY PRESENCE, not by value:
#   (key absent from the project)   -> inherit whatever is set here
#   match_labels = ["x"]            -> override with ["x"]
#   match_labels = []               -> override with NOTHING (match no labels)
# So an inherited key is never written into the project's own table, and
# changing a default here still reaches every project that inherits it.
#
# CAREFUL: match_labels / on_sent_set_label / blocked_label_id hold Linear label
# UUIDs, and Linear has TWO kinds — team labels (scoped to one team) and
# WORKSPACE labels (organisation-wide). A default here is inherited by projects
# on any team, so use a WORKSPACE label; a team label will simply never match
# issues outside its own team. The settings screens offer only workspace labels
# for these keys. Lola cannot tell them apart offline, so this is not validated.
#
# branch_prefix = "lola/"
# symlinks = [".env"]
# post_create = ["composer install", "bun install --frozen-lockfile"]
# match_labels = ["label_UUID_of_your_trigger_label"]
# match_mode = "any"                 # any | all
# dedup_mode = "label"               # label | seen | state
# on_sent_set_label = "label_UUID_of_your_taken_label"
# blocked_label_id = "label_UUID_of_your_blocked_label"
# priority_sort = ["priority", "createdAt"]
#
# [defaults.env]
# APP_ENV = "local"

[linear]
# Keychain SERVICE NAME (tried first):
#   security add-generic-password -s lola-linear -w lin_api_XXXXXXXX
api_key_keychain = "lola-linear"
# Env var NAME used as fallback when the keychain item is missing.
api_key_env = "LINEAR_API_KEY"
# GraphQL endpoint. Omit for the default.
endpoint = "https://api.linear.app/graphql"

# ---------------------------------------------------------------------------
# [reactions] — how lola reacts to each PR/CI state of a live session (P3).
# OPTIONAL: every reaction, and the whole table, defaults sensibly, so you can
# omit this section entirely. The values shown below ARE the built-in defaults.
#
# Each reaction has:
#   auto    — react automatically (vs. notify-and-park only).
#   retries — automatic recovery attempts; meaningful for ci_failed only; >= 0.
#   message — template sent to the live agent (empty = act but say nothing).
# A message may contain the placeholders {{.Detail}} (fetched CI logs / review
# comments), {{.Issue}} (Linear identifier) and {{.PR}} (PR number/URL). They
# are filled by plain string replacement — NOT a template engine — so a PR body
# or a failing log can never inject template directives.
# ---------------------------------------------------------------------------
# [reactions.ci_failed]           # red CI → hand the agent the failing logs, retry N times, then escalate
# auto = true
# retries = 2
# message = "CI is failing on your PR ({{.PR}}) for {{.Issue}}. Failing output:\n\n{{.Detail}}\n\nInvestigate the failure, fix it, and push."
#
# [reactions.changes_requested]   # review changes → relay the comments, re-request review on push
# auto = true
# message = "Changes were requested on your PR ({{.PR}}) for {{.Issue}}. Reviewer feedback:\n\n{{.Detail}}\n\nAddress each point, push, then re-request review."
#
# [reactions.merge_conflict]      # conflicts (observer sees mergeable=CONFLICTING) → tell the agent to rebase
# auto = true
# message = "Your PR ({{.PR}}) for {{.Issue}} has merge conflicts. Rebase onto the base branch, resolve the conflicts, and push."
#
# [reactions.approved_and_green]  # NEVER auto-merge — notify + park the worktree for a human
# auto = false
# message = ""
#
# [reactions.merged]              # merged → auto cleanup (remove worktree + branch, free the slot)
# auto = true

# ---------------------------------------------------------------------------
# [notify] — best-effort desktop + Slack notifications, routed by priority
# (P3.20). OPTIONAL; the values below are the defaults.
#
# SECURITY: never put a webhook URL in this file. slack_webhook_env is the NAME
# of an environment variable that holds the URL; lola reads it from the
# environment at notify time and never logs it.
# ---------------------------------------------------------------------------
# [notify]
# desktop = true                          # macOS desktop banners (no-op off macOS)
# slack_webhook_env = "SLACK_WEBHOOK_URL" # env var NAME holding the Slack incoming-webhook URL
# [notify.routing]                        # priority → channels; each channel is "desktop" or "slack"
# urgent = ["desktop", "slack"]           # needs-input, escalations
# action = ["desktop", "slack"]           # changes-requested, CI failed after retries
# info   = ["slack"]                      # approved+parked, merged+cleaned

# ---------------------------------------------------------------------------
# [brain] — OPTIONAL, OFF BY DEFAULT (P5). When enabled, lola makes ONE headless
# `claude -p` call to produce a short HUMAN-FACING summary at two decision
# points: when a session escalates (why it's blocked + the next step) and when a
# PR is approved+green (what it changes + risks to check). The summary rides the
# notification and an optional Linear comment ONLY — it is NEVER fed back to the
# worker agent, so an attacker-influenceable PR/log can't steer the control loop.
#
# COST: each summary spends Anthropic tokens. It execs `claude` and uses your
# existing claude auth (~/.claude) or ANTHROPIC_API_KEY in the daemon's env.
# Every call is one-shot per transition, hard-timeout-bounded, and skips
# gracefully (falling back to the generic template) on any error or timeout.
#
# Omit this whole section to keep the brain OFF — zero behavior change.
# The values shown below are the built-in defaults once enabled.
# ---------------------------------------------------------------------------
# [brain]
# enabled = true                 # master switch; false (and an absent table) = off
# model = "claude-sonnet-4-5"    # optional; empty = claude's default model (passed as --model when set)
# timeout_seconds = 120          # hard cap per summary call; must be >= 0
# summarize_escalation = true    # summarize why a stuck session is blocked
# summarize_approved = true      # summarize an approved+green PR before a human merges

# ---------------------------------------------------------------------------
# [review] — OPTIONAL, OFF BY DEFAULT (P9). The "QA buddy": an EVENT-TRIGGERED
# CodeRabbit review pass, NOT a persistent second agent. When enabled, the first
# time a session opens a PR lola execs the CodeRabbit CLI against that branch and
# hands the findings back to the worker (through the SAME send-keys safety gate
# as reactions — findings are untrusted diff content, sanitized, never run as a
# command) and, optionally, to a human via notify + a Linear comment. It runs
# once per PR and re-triggers on a NEW PR number.
#
# COST/DEPS: each pass execs the `coderabbit` CLI (must be installed and
# authenticated — run `coderabbit auth login`). It spends a CodeRabbit review and
# can take a while; if coderabbit is missing/unauthed the pass skips gracefully.
#
# Omit this whole section to keep the review OFF — zero behavior change.
# The values shown below are the built-in defaults once enabled.
# ---------------------------------------------------------------------------
# [review]
# enabled = true                 # master switch; false (and an absent table) = off
# command = ""                   # optional argv override (space-split), e.g. "coderabbit review --plain --type all"; empty = runner default
# on_pr_open = true              # run automatically when a session first opens a PR
# send_to_agent = true           # feed findings back to the worker via the send-keys gate
# comment_on_linear = false      # also post findings as a Linear comment
# timeout_seconds = 300          # hard cap per review pass; must be >= 0

# ---------------------------------------------------------------------------
# [coderabbit] — OPTIONAL, OFF BY DEFAULT. The PR-COMMENT WATCH — distinct from
# [review]. [review] execs the CodeRabbit CLI locally; [coderabbit] instead POLLS
# each session's GitHub PR (via gh, on the ~30s observer cadence) for comments and
# reviews left by the CodeRabbit GitHub app (or ANY reviewer bot, via `author`)
# and routes each NEW one to a human (notify), the worker agent (sanitized +
# idle-gated, same safety gate as reactions), and/or a Linear comment.
#
# WHY POLL, NOT WEBHOOK: lola is a local socket daemon with no HTTP ingress and
# can be stopped exactly when a webhook would fire. A per-session watermark makes
# the poll fire-once per comment AND survive any downtime — the next cycle
# reconciles the PR's current comments instead of replaying a missed delivery.
#
# COST/DEPS: gh only (already required). Each enabled session adds ONE read-only
# `gh pr view` per ~30s cycle while its PR is open. A comment body is UNTRUSTED
# (attacker-authorable) — sanitized before it can reach a pane, never a command.
#
# Omit this whole section to keep the watch OFF — zero behavior change.
# The values shown below are the built-in defaults once enabled.
# ---------------------------------------------------------------------------
# [coderabbit]
# enabled = true                 # master switch; false (and an absent table) = off
# author = "coderabbitai"        # login SUBSTRING matched against comment authors (the CodeRabbit app is "coderabbitai[bot]"); set to watch a different bot
# notify = true                  # surface each new comment to a human
# send_to_agent = true           # relay each new comment to the worker via the send-keys gate
# comment_on_linear = false      # also mirror each new comment onto the Linear issue

# ---------------------------------------------------------------------------
# [tmux] — OPTIONAL attach-UX tuning. Every field has a safe default, so you can
# omit this whole section for zero behavior change. The values shown below ARE
# the built-in defaults.
#
# ISOLATION: lola runs its agent sessions on its OWN tmux server, addressed as
# `tmux -L <socket_name>`. That server is SEPARATE from your personal default
# tmux — attaching to or detaching from a lola session never touches your own
# tmux sessions or options.
#
# DETACH: by default you detach with tmux's built-in Ctrl-b d. Binding a single
# friendlier key (e.g. "F12") is OPT-IN because remapping keys is a taste
# choice; when set, lola's status bar shows that key as the detach hint.
# ---------------------------------------------------------------------------
# [tmux]
# socket_name = "lola"   # isolated tmux server socket (tmux -L); its own server, never your default one
# detach_key = ""        # opt-in single detach key (e.g. "F12"); empty keeps tmux's default Ctrl-b d
# status_right = ""       # raw tmux status-right override; empty = lola's built-in branded bar
# mouse = false           # enable tmux mouse mode inside the session

# ---------------------------------------------------------------------------
# [[project]] — repository registry for the native runtime (one table per
# repo). Every poll references a project by name; lola then creates a git
# worktree per session under ~/.lola/worktrees/<project>/... and runs Claude
# Code in tmux inside it.
# ---------------------------------------------------------------------------
[[project]]
name = "nori-app"
# Absolute path to the main checkout (a leading ~ is expanded on load).
# Worktrees are created NEXT TO it under ~/.lola/, never inside it.
path = "/Volumes/Git/sushi/internal/nori/nori-app"
# GitHub "owner/name"; used for PR/CI observation of native sessions.
# The TUI and desktop forms auto-detect this from the checkout's remotes when
# you set `path` (upstream first, then origin) — verify it on a fork. Left
# empty, PR checks are unavailable and orphaned issues are never auto-reverted
# (fail-closed), which is why detection leaves it empty rather than guessing.
repo = "sushidev-team/nori-app"
# Branch new session worktrees start from. Default when omitted: "main".
default_branch = "main"
# Commands run inside a fresh worktree BEFORE the agent starts; any failure
# blocks the session (a clear error status, never a half-started agent).
# Omit the key entirely to inherit [defaults].post_create; set it to [] to run
# nothing even though a default exists.
post_create = [
  "composer install",
  "bun install --frozen-lockfile",
]
# Files symlinked from the main checkout into each worktree.
# CAVEAT: symlinking .env means every worktree talks to the SAME database
# (and caches, queues, ...) as the main checkout — concurrent sessions can
# step on each other's migrations and seed data. Point sessions at separate
# databases if that matters for your project.
# Omit to inherit [defaults].symlinks; set to [] to link nothing.
symlinks = [".env"]
# Coding agent for THIS repo, overriding [defaults].agent. One of
# claude | codex | opencode. Empty/omitted inherits the global default
# (which itself defaults to claude). See [defaults].agent above for how each
# agent's lifecycle callbacks are wired and where provider auth comes from.
# agent = "claude"
#
# --- Linear polling (OPTIONAL) ---------------------------------------------
# Configure this project to auto-spawn agents from Linear. Omit team_id and the
# project is manual-only (open PRs / worktrees by hand from the TUI). A project
# has at most ONE polling config — it lives inline here, on the project.
enabled = true
team_id = "team_FE00aaaa-1111-2222-3333-444455556666"
project_id = ""       # optional Linear project filter; empty/omitted = whole team
cycle_mode = "active" # none | active | pinned (active re-resolves each tick)
cycle_id = ""
state_ids = ["state_aaaa0000-1111-2222-3333-444455556666"]
# Omit to inherit [defaults].match_labels; set to [] to match on state alone.
match_labels = ["label_trig0000-1111-2222-3333-444455556666"]
match_mode = "any"    # any = one trigger label; all = every trigger label
assignee_mode = "me"  # anyone | me | user (user requires assignee_user_id)
assignee_user_id = ""
concurrency_cap = 2   # 0/omitted falls back to [defaults].concurrency_cap
priority_sort = ["priority", "createdAt"]
dedup_mode = "label"  # label | seen | state
# label mode: after a spawn lola removes match_labels and sets this label, so
# the issue stops matching. Must NOT be one of match_labels.
on_sent_set_label = "label_sent0000-1111-2222-3333-444455556666"
# Optional Linear write-back (P4): advance the issue's state / comment as the
# agent progresses. All optional; omit and the project just spawns.
# on_spawn_state_id = "state_inprogress-..."
# on_pr_state_id = "state_inreview-..."
# on_merged_state_id = "state_done-..."
# comment_on_pr = true
# Extra environment variables exported into each session.
[project.env]
# APP_ENV = "local"

# ---------------------------------------------------------------------------
# Poll 4: Linear WRITE-BACK with state-based dedup (P4). Instead of flipping
# labels or keeping a seen file, lola advances the issue's own workflow state
# as the agent progresses — and that same move is what dedups it. On spawn the
# issue is moved to on_spawn_state_id ("In Progress"), which is NOT one of
# state_ids, so it leaves the matching set and never respawns. As the session
# progresses lola also moves it to "In Review" when a PR opens (or, with
# pr_requires_checks, once that PR's checks go green) and "Done" when it merges,
# and posts a short comment at each point. An escalation (agent blocked) adds
# blocked_label_id and comments the reason.
#
# dedup_mode="state" requires on_spawn_state_id set AND that it is NOT one of
# state_ids (else the issue keeps matching after the move and respawns forever).
# All write-back fields are OPTIONAL — omit them and the poll behaves like any
# other. The comment_* booleans use lola's built-in templates; comments never
# run a template engine, so PR links / block reasons can't inject directives.
# ---------------------------------------------------------------------------
# [[poll]]
# name = "nori-writeback"
# enabled = false
# team_id = "team_FE00aaaa-1111-2222-3333-444455556666"
# project_id = ""
# cycle_mode = "active"
# cycle_id = ""
# # "Ready for agent" state — the only matching state; the agent moves the
# # issue out of it on spawn (see on_spawn_state_id below).
# state_ids = ["state_ready000-1111-2222-3333-444455556666"]
# match_labels = ["label_trig0000-1111-2222-3333-444455556666"]
# match_mode = "any"
# assignee_mode = "me"
# assignee_user_id = ""
# project = "nori-app"
# repo = "sushidev-team/nori-app"
# concurrency_cap = 2
# priority_sort = ["priority", "createdAt"]
# # state = dedup by workflow-state transition (no seen file, no label flip).
# dedup_mode = "state"
# # --- Linear write-back (all optional) ---
# # On spawn, move the issue here. REQUIRED for dedup_mode=state and must NOT be
# # one of state_ids (otherwise it keeps matching and respawns forever).
# on_spawn_state_id = "state_inprog00-1111-2222-3333-444455556666"
# # When the agent opens a PR, move to "In Review" and comment the PR link.
# on_pr_state_id = "state_review00-1111-2222-3333-444455556666"
# comment_on_pr = true
# # Only flip to "In Review" once the PR is VALID — open, not a draft, and every
# # CI/CodeRabbit check green — instead of the instant it opens. Default false.
# pr_requires_checks = true
# # When the PR merges, move to "Done".
# on_merged_state_id = "state_done0000-1111-2222-3333-444455556666"
# # On escalation (agent blocked), add this label so a human can triage.
# blocked_label_id = "label_blocked0-1111-2222-3333-444455556666"
# # Optional lifecycle comments (default false) using lola's built-in templates.
# comment_on_spawn = false
# comment_on_merged = false
# comment_on_blocked = true
