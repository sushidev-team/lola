version: '3'
info:
  companyName: sushidev
  productName: lola
  productIdentifier: dev.sushi.lola.desktop
  description: Native cockpit for the lola coding-agent orchestrator
  copyright: (c) 2026, sushidev
  comments: >-
    Watches Linear and runs a coding agent per issue in its own git worktree and
    tmux session.
  version: 0.2.1
dev_mode:
  root_path: .
  log_level: warn
  debounce: 1000
  ignore:
    dir:
      - .git
      - node_modules
      - frontend
      - bin
    file:
      - .DS_Store
      - .gitignore
      - .gitkeep
      - '*_test.go'
    watched_extension:
      - '*.go'
      - '*.js'
      - '*.ts'
    git_ignore: true
  executes:
    - cmd: wails3 build DEV=true
      type: blocking
    - cmd: wails3 task common:dev:frontend
      type: background
    - cmd: wails3 task run
      type: primary
fileAssociations: null
other:
  - name: My Other Data
