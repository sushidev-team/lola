# goreleaser v2 config. Local check: `goreleaser check`. Release is driven by
# .github/workflows/release.yml on a v* tag.
version: 2

project_name: lola

before:
  hooks:
    - go mod download

builds:
  - id: lola
    main: .
    binary: lola
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X main.version={{.Version}} -X main.commit={{.Commit}} -X main.date={{.Date}}
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64

archives:
  - id: lola
    formats: [tar.gz]
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    files:
      - README.md
      - LICENSE
      - config.example.toml
      - contrib/com.user.lola.plist

checksum:
  name_template: 'checksums.txt'

# release-please owns the changelog + the GitHub Release body. goreleaser must
# not generate or write release notes, or it would clobber them.
changelog:
  disable: true

release:
  # The release already exists (release-please created it on the merged release
  # PR). Append mode uploads the archives + checksums onto it without touching
  # the release-please-authored notes. With changelog disabled there are no
  # goreleaser notes to append — it purely attaches artifacts.
  mode: append
