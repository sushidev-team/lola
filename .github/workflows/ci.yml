name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-test:
    # macOS, not Linux: the desktop package imports wails/v3, whose webview
    # backend needs GTK4/WebKitGTK dev libs (via pkg-config) on Linux but only
    # the built-in Cocoa/WebKit frameworks on macOS. lola-desktop ships macOS
    # only (see release.yml, also macos-latest), so `go vet/build/test ./...`
    # here exercises the real target — including the darwin-only cgo in
    # hidpi_darwin.go — without provisioning GTK on a variant that never ships.
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true

      - name: gofmt
        run: |
          out=$(gofmt -l .)
          if [ -n "$out" ]; then
            echo "These files are not gofmt-clean:"
            echo "$out"
            exit 1
          fi

      # desktop/build/** holds Wails per-platform SCAFFOLD (e.g. the ios
      # app_options fragment is `package main` with no main() — it only compiles
      # once `wails3 task ios` generates the rest). It isn't app code and can't
      # be built standalone, so exclude it from the generic Go steps.
      #
      # internal/tui and internal/vtterm run WITHOUT -race: their terminal-embed
      # tests spin up a real charmbracelet/x/vt emulator, which races on its own
      # unguarded `closed` bool between Emulator.Close() and the lock-free
      # SafeEmulator.Read() (an upstream defect, benign — a monotonic set-once
      # flag — that lola cannot guard from outside the dependency). The only
      # -race-relevant code in those packages is that upstream-blocked lifecycle,
      # so they still run here, just not race-instrumented.
      - name: packages
        id: pkgs
        run: |
          list=$(go list ./... | grep -v '/desktop/build/')
          {
            echo "list=$(echo "$list" | tr '\n' ' ')"
            echo "race=$(echo "$list" | grep -vE '/internal/(tui|vtterm)$' | tr '\n' ' ')"
            echo "norace=$(echo "$list" | grep -E '/internal/(tui|vtterm)$' | tr '\n' ' ')"
          } >> "$GITHUB_OUTPUT"

      - name: go vet
        run: go vet ${{ steps.pkgs.outputs.list }}

      - name: build
        run: go build ${{ steps.pkgs.outputs.list }}

      - name: test (race)
        run: go test -race -count=1 ${{ steps.pkgs.outputs.race }}

      - name: test (tui/vtterm, no race — upstream x/vt closed-flag race)
        run: go test -count=1 ${{ steps.pkgs.outputs.norace }}
