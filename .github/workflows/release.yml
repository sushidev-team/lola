name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write # goreleaser creates the GitHub release + uploads artifacts

jobs:
  release:
    runs-on: macos-latest # native darwin build; also cross-compiles linux
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # goreleaser needs full history + tags for the changelog

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true

      - uses: goreleaser/goreleaser-action@v6
        with:
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
